<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All HTML Form Elements</title>
</head>
<body>

<form action="#" method="post">

  <fieldset>
    <legend>All Form Elements Demo</legend>

    <!-- Text-based Inputs -->
    <p>
      <label>Text:
        <input type="text" name="text">
      </label>
    </p>

    <p>
      <label>Password:
        <input type="password" name="password">
      </label>
    </p>

    <p>
      <label>Email:
        <input type="email" name="email">
      </label>
    </p>

    <p>
      <label>Number:
        <input type="number" name="number">
      </label>
    </p>

    <p>
      <label>Telephone:
        <input type="tel" name="tel">
      </label>
    </p>

    <p>
      <label>URL:
        <input type="url" name="url">
      </label>
    </p>

    <p>
      <label>Search:
        <input type="search" name="search">
      </label>
    </p>

    <!-- Date & Time Inputs -->
    <p>
      <label>Date:
        <input type="date" name="date">
      </label>
    </p>

    <p>
      <label>Time:
        <input type="time" name="time">
      </label>
    </p>

    <p>
      <label>DateTime Local:
        <input type="datetime-local" name="datetime">
      </label>
    </p>

    <p>
      <label>Month:
        <input type="month" name="month">
      </label>
    </p>

    <p>
      <label>Week:
        <input type="week" name="week">
      </label>
    </p>

    <!-- Specialized Inputs -->
    <p>
      <label>Color:
        <input type="color" name="color">
      </label>
    </p>

    <p>
      <label>Range:
        <input type="range" name="range" min="0" max="100">
      </label>
    </p>

    <p>
      <label>File:
        <input type="file" name="file">
      </label>
    </p>

    <p>
      <label>Hidden Input:</label>
      <input type="hidden" name="hidden" value="secret">
      (hidden field exists in source)
    </p>

    <!-- Checkboxes -->
    <p>
      <label>
        <input type="checkbox" name="newsletter">
        Subscribe to newsletter
      </label>
    </p>

    <!-- Radio Buttons -->
    <p>Gender:</p>

    <label>
      <input type="radio" name="gender" value="male">
      Male
    </label>

    <label>
      <input type="radio" name="gender" value="female">
      Female
    </label>

    <label>
      <input type="radio" name="gender" value="other">
      Other
    </label>

    <hr>

    <!-- Textarea -->
    <p>
      <label>Comments:</label><br>
      <textarea name="comments" rows="5" cols="40"></textarea>
    </p>

    <!-- Select -->
    <p>
      <label>Country:</label><br>
      <select name="country">
        <option value="">Select Country</option>

        <optgroup label="North America">
          <option>United States</option>
          <option>Canada</option>
          <option>Mexico</option>
        </optgroup>

        <optgroup label="Europe">
          <option>United Kingdom</option>
          <option>France</option>
          <option>Germany</option>
        </optgroup>
      </select>
    </p>

    <!-- Datalist -->
    <p>
      <label>Favorite Browser:</label><br>
      <input list="browsers" name="browser">

      <datalist id="browsers">
        <option value="Chrome">
        <option value="Firefox">
        <option value="Safari">
        <option value="Edge">
        <option value="Opera">
      </datalist>
    </p>

    <!-- Meter -->
    <p>
      Skill Level:
      <meter min="0" max="100" value="75">75%</meter>
    </p>

    <!-- Progress -->
    <p>
      Upload Progress:
      <progress value="60" max="100">60%</progress>
    </p>

    <!-- Output -->
    <p>
      Calculation:
      <input type="number" id="a" value="5"
             oninput="result.value=parseInt(a.value||0)+parseInt(b.value||0)">
      +
      <input type="number" id="b" value="10"
             oninput="result.value=parseInt(a.value||0)+parseInt(b.value||0)">
      =
      <output name="result">15</output>
    </p>

    <hr>

    <!-- Button Types -->
    <p>
      <input type="button" value="Input Button">

      <input type="submit" value="Submit Input">

      <input type="reset" value="Reset Input">

      <input
        type="image"
        alt="Image Submit"
        src="https://via.placeholder.com/100x40?text=Submit">
    </p>

    <p>
      <button type="button">Button Element</button>

      <button type="submit">Submit Button</button>

      <button type="reset">Reset Button</button>
    </p>

  </fieldset>

</form>

</body>
</html>
