<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hospital Patient Registration Form</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#eaf6ff;
    padding:30px;
}

.container{
    width:80%;
    max-width:900px;
    margin:auto;
    background:#fff;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    color:#0066cc;
    margin-bottom:20px;
}

fieldset{
    border:2px solid #0066cc;
    border-radius:8px;
    margin-bottom:20px;
    padding:20px;
}

legend{
    color:#0066cc;
    font-size:20px;
    font-weight:bold;
    padding:0 10px;
}

.form-group{
    margin-bottom:15px;
}

label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
}

input,
select,
textarea{
    width:100%;
    padding:10px;
    border:1px solid #999;
    border-radius:5px;
    font-size:15px;
}

input[type="radio"],
input[type="checkbox"]{
    width:auto;
    margin-right:5px;
}

textarea{
    resize:vertical;
}

.buttons{
    text-align:center;
}

input[type="submit"],
input[type="reset"]{
    width:180px;
    padding:12px;
    margin:10px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
    color:white;
}

input[type="submit"]{
    background:#007bff;
}

input[type="submit"]:hover{
    background:#0056b3;
}

input[type="reset"]{
    background:#dc3545;
}

input[type="reset"]:hover{
    background:#b52b38;
}
</style>

</head>
<body>

<div class="container">

<h1>Hospital Patient Registration Form</h1>

<form>

<!-- Personal Information -->
<fieldset>

<legend>Personal Information</legend>

<div class="form-group">
<label>Patient ID</label>
<input type="text" placeholder="Enter Patient ID">
</div>

<div class="form-group">
<label>First Name</label>
<input type="text" required>
</div>

<div class="form-group">
<label>Middle Name</label>
<input type="text">
</div>

<div class="form-group">
<label>Last Name</label>
<input type="text" required>
</div>

<div class="form-group">
<label>Password</label>
<input type="password">
</div>

<div class="form-group">
<label>Email</label>
<input type="email">
</div>

<div class="form-group">
<label>Phone Number</label>
<input type="tel">
</div>

<div class="form-group">
<label>Date of Birth</label>
<input type="date">
</div>

<div class="form-group">
<label>Age</label>
<input type="number" min="0" max="120">
</div>

<div class="form-group">
<label>Gender</label>

<input type="radio" name="gender"> Male

<input type="radio" name="gender"> Female

<input type="radio" name="gender"> Other

</div>

<div class="form-group">
<label>Blood Group</label>

<select>
<option>Select</option>
<option>A+</option>
<option>A-</option>
<option>B+</option>
<option>B-</option>
<option>AB+</option>
<option>AB-</option>
<option>O+</option>
<option>O-</option>
</select>

</div>

</fieldset>

<!-- Contact Information -->

<fieldset>

<legend>Contact Information</legend>

<div class="form-group">
<label>Address</label>
<textarea rows="4"></textarea>
</div>

<div class="form-group">
<label>City</label>
<input list="city">
<datalist id="city">
<option>New York</option>
<option>Chicago</option>
<option>Los Angeles</option>
<option>Houston</option>
<option>Dallas</option>
</datalist>
</div>

<div class="form-group">
<label>Zip Code</label>
<input type="text">
</div>

<div class="form-group">
<label>Emergency Contact</label>
<input type="tel">
</div>

</fieldset>

<!-- Medical Information -->

<fieldset>

<legend>Medical Information</legend>

<div class="form-group">
<label>Department</label>

<select>

<option>General Medicine</option>
<option>Cardiology</option>
<option>Orthopedics</option>
<option>Neurology</option>
<option>Pediatrics</option>
<option>Dermatology</option>

</select>

</div>

<div class="form-group">
<label>Appointment Date</label>
<input type="date">
</div>

<div class="form-group">
<label>Appointment Time</label>
<input type="time">
</div>

<div class="form-group">
<label>Symptoms</label>
<textarea rows="5"></textarea>
</div>

<div class="form-group">
<label>Medical History</label>
<textarea rows="5"></textarea>
</div>

<div class="form-group">
<label>Insurance Number</label>
<input type="text">
</div>

<div class="form-group">
<label>Allergies</label>
<input type="text">
</div>

</fieldset>

<!-- Other Information -->

<fieldset>

<legend>Other Information</legend>

<div class="form-group">
<label>Upload Medical Report</label>
<input type="file">
</div>

<div class="form-group">
<label>Hospital Website</label>
<input type="url">
</div>

<div class="form-group">
<label>Favorite Color</label>
<input type="color">
</div>

<div class="form-group">
<label>Search Previous Record</label>
<input type="search">
</div>

<div class="form-group">
<label>Registration Month</label>
<input type="month">
</div>

<div class="form-group">
<label>Registration Week</label>
<input type="week">
</div>

<div class="form-group">
<label>Date & Time</label>
<input type="datetime-local">
</div>

<div class="form-group">
<label>Health Rating</label>
<input type="range" min="1" max="10">
</div>

<div class="form-group">
<label>
<input type="checkbox">
I agree to the hospital terms and conditions.
</label>
</div>

<input type="hidden" value="HOSP001">

</fieldset>

<div class="buttons">
<input type="submit" value="Register">
<input type="reset" value="Reset">
</div>

</form>

</div>

</body>
</html>
